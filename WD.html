<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>위대리 리밸런싱 계산기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;600&family=JetBrains+Mono:wght@500&display=swap');
  
  :root {
    --bg: #0f0e0c; --surface: #1a1816; --border: #3a3632;
    --text: #e8e3dc; --text-dim: #9a9188;
    --accent: #d4a574; --green: #7ca982; --red: #c47171;
  }
  
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans KR', sans-serif; padding: 20px; }
  .container { max-width: 480px; margin: 0 auto; background: var(--surface); padding: 24px; border-radius: 12px; border: 1px solid var(--border); }
  h2 { font-size: 1.2rem; color: var(--accent); margin-bottom: 20px; text-align: center; }
  
  .input-group { margin-bottom: 16px; }
  .input-group label { display: block; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 6px; }
  .input-group input, .input-group select { 
    width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); 
    color: var(--text); font-family: 'JetBrains Mono', monospace; border-radius: 6px; font-size: 1rem;
  }
  .input-group input:focus { border-color: var(--accent); outline: none; }
  
  .result-box { margin-top: 24px; padding: 16px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border); }
  .result-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.95rem; }
  .result-val { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
  .buy { color: var(--green); } .sell { color: var(--red); }
  
  button { 
    width: 100%; padding: 14px; margin-top: 10px; background: var(--accent); color: var(--bg); 
    border: none; border-radius: 6px; font-weight: 600; font-size: 1rem; cursor: pointer; 
  }
  button:hover { opacity: 0.9; }
</style>
</head>
<body>

<div class="container">
  <h2>위대리(5구간) 계산기</h2>
  
  <div class="input-group">
    <label>전주 포트폴리오 자산 ($)</label>
    <input type="number" id="prevAsset" placeholder="예: 10000">
  </div>
  <div class="input-group">
    <label>현재 포트폴리오 자산 ($)</label>
    <input type="number" id="currAsset" placeholder="예: 10500">
  </div>
  <div class="input-group">
    <label>QQQ 편차 기준 현재 구간</label>
    <select id="zoneSelect">
      <option value="high_high">고고평가 (매도 384% / 매수 349%)</option>
      <option value="high">고평가 (매도 164% / 매수 468%)</option>
      <option value="mid" selected>중간가 (매도 10% / 매수 18%)</option>
      <option value="low">저평가 (매도 19% / 매수 464%)</option>
      <option value="low_low">저저평가 (매도 25% / 매수 184%)</option>
    </select>
  </div>
  
  <button onclick="calculate()">리밸런싱 계산하기</button>

  <div class="result-box" id="resultBox" style="display: none;">
    <div class="result-row"><span>자산 증감 (Delta):</span> <span class="result-val" id="deltaVal"></span></div>
    <div class="result-row"><span>매매 지시:</span> <span class="result-val" id="actionVal"></span></div>
    <div class="result-row"><span>목표 금액:</span> <span class="result-val" id="targetAmount"></span></div>
    <div style="font-size: 0.75rem; color: var(--text-dim); margin-top: 10px; text-align: right;">* 최소 10% 주식 비중 제한 미반영(수식 확인용)</div>
  </div>
</div>

<script>
  const ZONE_RATIOS = {
    'high_high': { sell: 3.84, buy: 3.49 },
    'high': { sell: 1.64, buy: 4.68 },
    'mid': { sell: 0.10, buy: 0.18 },
    'low': { sell: 0.19, buy: 4.64 },
    'low_low': { sell: 0.25, buy: 1.84 }
  };

  function calculate() {
    const prev = parseFloat(document.getElementById('prevAsset').value);
    const curr = parseFloat(document.getElementById('currAsset').value);
    const zone = document.getElementById('zoneSelect').value;
    
    if(!prev || !curr) { alert("자산을 정확히 입력해주세요."); return; }

    const delta = curr - prev;
    const ratio = ZONE_RATIOS[zone];
    
    document.getElementById('resultBox').style.display = 'block';
    const deltaSpan = document.getElementById('deltaVal');
    const actionSpan = document.getElementById('actionVal');
    const amountSpan = document.getElementById('targetAmount');

    deltaSpan.innerText = `$${delta > 0 ? '+' : ''}${delta.toFixed(2)}`;
    deltaSpan.className = 'result-val ' + (delta > 0 ? 'buy' : 'sell'); // 색상 편의상

    if (delta > 0) {
      actionSpan.innerText = "일부 매도 (이익 실현)";
      actionSpan.className = 'result-val sell';
      amountSpan.innerText = `$${(delta * ratio.sell).toFixed(2)} 매도`;
    } else if (delta < 0) {
      actionSpan.innerText = "추가 매수 (손실 물타기)";
      actionSpan.className = 'result-val buy';
      amountSpan.innerText = `$${(Math.abs(delta) * ratio.buy).toFixed(2)} 매수`;
    } else {
      actionSpan.innerText = "HOLD (관망)";
      actionSpan.className = 'result-val';
      amountSpan.innerText = "$0.00";
    }
  }
</script>
</body>
</html>
