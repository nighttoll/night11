<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>위대리 자동화 대시보드</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap');
        
        :root {
            --bg: #121212; --surface: #1e1e1e; --border: #333;
            --text: #f0f0f0; --text-dim: #a0a0a0;
            --accent: #4da6ff; --accent-hover: #338be6;
            --green: #4caf50; --red: #ff5252;
            --high-color: #ff5252; --mid-color: #4caf50; --low-color: #ba68c8;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans KR', sans-serif; padding: 20px; display: flex; justify-content: center; }
        
        .dashboard { width: 100%; max-width: 540px; background: var(--surface); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .header { background: #181818; padding: 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .header h1 { font-size: 1.4rem; color: var(--text); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .header p { font-size: 0.85rem; color: var(--text-dim); margin-top: 5px; }
        
        .content { padding: 24px; display: flex; flex-direction: column; gap: 20px; }
        
        .card { background: #252525; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .card-title { font-size: 1rem; font-weight: 600; color: var(--text-dim); }
        
        /* 주가 표시 영역 */
        .price-box { display: flex; align-items: baseline; gap: 10px; }
        .current-price { font-family: 'JetBrains Mono', monospace; font-size: 2.2rem; font-weight: 700; color: var(--accent); }
        
        /* 버튼 */
        button { 
            background: var(--accent); color: #fff; border: none; padding: 10px 16px; border-radius: 8px; 
            font-family: inherit; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.9rem;
        }
        button:hover { background: var(--accent-hover); }
        button:active { transform: scale(0.97); }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        
        .fetch-btn { display: flex; align-items: center; gap: 6px; }
        
        /* 입력 폼 */
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 8px; }
        input[type="number"] { 
            width: 100%; padding: 14px; background: #121212; border: 1px solid var(--border); 
            color: var(--text); font-family: 'JetBrains Mono', monospace; border-radius: 8px; font-size: 1.1rem;
        }
        input:focus { border-color: var(--accent); outline: none; }
        
        /* 구간 게이지/결과 */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .stat-box { background: #181818; padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #333; }
        .stat-label { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 4px; }
        .stat-val { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; font-weight: 600; }
        
        .zone-banner { text-align: center; padding: 16px; border-radius: 8px; font-weight: 700; font-size: 1.2rem; margin-top: 10px; border: 1px solid transparent; }
        
        .action-result { margin-top: 20px; padding: 20px; border-radius: 12px; background: rgba(77, 166, 255, 0.05); border: 1px dashed var(--accent); text-align: center; display: none; }
        .action-result h3 { font-size: 1rem; color: var(--text-dim); margin-bottom: 10px; }
        .action-text { font-family: 'JetBrains Mono', monospace; font-size: 1.6rem; font-weight: 700; }
        .buy-color { color: var(--green); }
        .sell-color { color: var(--red); }
        .hold-color { color: var(--text); }
        
        /* 로딩 스피너 */
        .loader { border: 3px solid #333; border-top: 3px solid #fff; border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1>📊 위대리 자동화 대시보드</h1>
        <p>5구간 전략 (NATAS v6.0 기반)</p>
    </div>

    <div class="content">
        <div class="card">
            <div class="card-header">
                <span class="card-title">현재 QQQ 주가</span>
                <button class="fetch-btn" id="fetchBtn" onclick="fetchQQQPrice()">
                    <div class="loader" id="loader"></div>
                    <span id="btnText">실시간 불러오기</span>
                </button>
            </div>
            <div class="price-box">
                <span class="current-price" id="qqqPriceDisplay">$0.00</span>
            </div>
            <input type="hidden" id="qqqPriceInput"> </div>

        <div class="card" id="analysisCard" style="display: none;">
            <div class="grid-2">
                <div class="stat-box">
                    <div class="stat-label">추세선 적정가</div>
                    <div class="stat-val" id="trendVal">$0.00</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">현재 편차</div>
                    <div class="stat-val" id="devVal">0.00%</div>
                </div>
            </div>
            <div class="zone-banner" id="zoneBanner">구간 판정 대기중</div>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-title">리밸런싱 계산</span>
            </div>
            <div class="input-group">
                <label>지난주 총 자산 ($)</label>
                <input type="number" id="prevAsset" placeholder="예: 10000" step="0.01">
            </div>
            <div class="input-group">
                <label>현재 총 자산 ($) - 리밸런싱 전</label>
                <input type="number" id="currAsset" placeholder="예: 10200" step="0.01">
            </div>
            
            <button style="width: 100%; padding: 16px; margin-top: 10px; font-size: 1.1rem;" onclick="calculateAction()">최종 주문금액 산출</button>

            <div class="action-result" id="actionResultBox">
                <h3>이번 주 TQQQ 주문 지시</h3>
                <div class="action-text" id="actionText"></div>
                <p style="font-size: 0.8rem; color: var(--text-dim); margin-top: 15px;">* 계산 완료 시 현재 자산이 '지난주 자산'으로 자동 저장됩니다.</p>
            </div>
        </div>
    </div>
</div>

<script>
    // --- 위대리 핵심 파라미터 (파이썬/엑셀 기반) ---
    const START_DATE = new Date('2010-02-12');
    const SLOPE = 0.00331; 
    const INTERCEPT = 3.82; 

    // 구간별 매매 비율
    const ZONES = [
        { key: 'high_high', label: '고고평가', min: 0.095, sell: 3.84, buy: 3.49, color: 'rgba(255,82,82,0.15)', border: '#ff5252', textColor: '#ff5252' },
        { key: 'high', label: '고평가', min: 0.060, sell: 1.64, buy: 4.68, color: 'rgba(255,167,38,0.15)', border: '#ffa726', textColor: '#ffa726' },
        { key: 'mid', label: '중간가', min: -0.100, sell: 0.10, buy: 0.18, color: 'rgba(76,175,80,0.15)', border: '#4caf50', textColor: '#4caf50' },
        { key: 'low', label: '저평가', min: -0.125, sell: 0.19, buy: 4.64, color: 'rgba(66,165,245,0.15)', border: '#42a5f5', textColor: '#42a5f5' },
        { key: 'low_low', label: '저저평가', min: -Infinity, sell: 0.25, buy: 1.84, color: 'rgba(186,104,200,0.15)', border: '#ba68c8', textColor: '#ba68c8' }
    ];

    let currentZoneData = null; // 현재 판정된 구간 저장

    // 페이지 로드 시 로컬 스토리지 데이터 복구
    window.onload = () => {
        const savedPrevAsset = localStorage.getItem('widae_prevAsset');
        if (savedPrevAsset) document.getElementById('prevAsset').value = savedPrevAsset;
    };

    // 1. 야후 파이낸스에서 실시간 QQQ 주가 가져오기 (CORS 우회 Proxy 사용)
    async function fetchQQQPrice() {
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loader');
        const btn = document.getElementById('fetchBtn');
        
        btnText.innerText = "불러오는 중...";
        loader.style.display = "block";
        btn.disabled = true;

        try {
            // AllOrigins 무료 CORS 프록시를 통해 Yahoo Finance API 접근
            const targetUrl = encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/QQQ?interval=1d&range=1d');
            const proxyUrl = `https://api.allorigins.win/get?url=${targetUrl}`;
            
            const response = await fetch(proxyUrl);
            const data = await response.json();
            const yfData = JSON.parse(data.contents);
            
            const price = yfData.chart.result[0].meta.regularMarketPrice;
            
            // UI 업데이트
            document.getElementById('qqqPriceDisplay').innerText = `$${price.toFixed(2)}`;
            document.getElementById('qqqPriceInput').value = price;
            
            // 구간 자동 분석 실행
            analyzeZone(price);

        } catch (error) {
            console.error("데이터를 불러오는 중 오류 발생:", error);
            alert("주가를 가져오는데 실패했습니다. 야후 파이낸스 서버 문제일 수 있습니다. 수동으로 계산해주세요.");
            // 수동 입력을 위한 처리 (프롬프트로 받기)
            const manualPrice = prompt("현재 QQQ 주가를 직접 입력해주세요:");
            if(manualPrice && !isNaN(manualPrice)) {
                document.getElementById('qqqPriceDisplay').innerText = `$${parseFloat(manualPrice).toFixed(2)}`;
                document.getElementById('qqqPriceInput').value = parseFloat(manualPrice);
                analyzeZone(parseFloat(manualPrice));
            }
        } finally {
            btnText.innerText = "새로고침";
            loader.style.display = "none";
            btn.disabled = false;
        }
    }

    // 2. 주가를 바탕으로 5구간 분석 및 추세선 계산
    function analyzeZone(qqqPrice) {
        const now = new Date();
        const weeks = (now - START_DATE) / (1000 * 60 * 60 * 24 * 7);
        const trendPrice = Math.exp(INTERCEPT + SLOPE * weeks);
        const dev = (qqqPrice / trendPrice) - 1;

        // 구간 판정
        currentZoneData = ZONES.find(z => dev > z.min);

        // UI 표시
        document.getElementById('analysisCard').style.display = 'block';
        document.getElementById('trendVal').innerText = `$${trendPrice.toFixed(2)}`;
        document.getElementById('devVal').innerText = `${(dev * 100).toFixed(2)}%`;
        document.getElementById('devVal').style.color = currentZoneData.textColor;

        const banner = document.getElementById('zoneBanner');
        banner.innerText = `현재 상태 : ${currentZoneData.label}`;
        banner.style.backgroundColor = currentZoneData.color;
        banner.style.borderColor = currentZoneData.border;
        banner.style.color = currentZoneData.textColor;
    }

    // 3. 자산 증감분에 따른 최종 리밸런싱 주문금액 산출
    function calculateAction() {
        const qqqPrice = parseFloat(document.getElementById('qqqPriceInput').value);
        const prevAsset = parseFloat(document.getElementById('prevAsset').value);
        const currAsset = parseFloat(document.getElementById('currAsset').value);

        if (!qqqPrice || !currentZoneData) {
            alert("먼저 상단의 [실시간 불러오기] 버튼을 눌러 QQQ 가격을 업데이트해주세요.");
            return;
        }
        if (isNaN(prevAsset) || isNaN(currAsset)) {
            alert("지난주 자산과 현재 자산을 정확히 입력해주세요.");
            return;
        }

        const delta = currAsset - prevAsset;
        const resultBox = document.getElementById('actionResultBox');
        const textSpan = document.getElementById('actionText');
        
        resultBox.style.display = 'block';

        if (delta > 0) {
            const sellAmount = delta * currentZoneData.sell;
            textSpan.innerHTML = `<span class="sell-color">TQQQ $${sellAmount.toLocaleString(undefined, {maximumFractionDigits:2})} 매도</span>`;
        } else if (delta < 0) {
            const buyAmount = Math.abs(delta) * currentZoneData.buy;
            textSpan.innerHTML = `<span class="buy-color">TQQQ $${buyAmount.toLocaleString(undefined, {maximumFractionDigits:2})} 매수</span>`;
        } else {
            textSpan.innerHTML = `<span class="hold-color">HOLD (관망)</span>`;
        }

        // 성공적으로 리밸런싱을 마쳤다면, 현재 자산을 '지난주 자산'으로 로컬스토리지에 덮어쓰기
        localStorage.setItem('widae_prevAsset', currAsset);
    }
</script>
</body>
</html>
