<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>위대리 클라우드 대시보드 v2.5</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap');
        
        :root {
            --bg: #0f0e0c; --surface: #1a1816; --border: #3a3632;
            --text: #e8e3dc; --text-dim: #9a9188;
            --accent: #d4a574; --green: #7ca982; --red: #c47171;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans KR', sans-serif; padding: 15px; display: flex; justify-content: center; }
        
        .dashboard { width: 100%; max-width: 540px; background: var(--surface); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .header { background: #131210; padding: 25px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .header h1 { font-size: 1.4rem; color: var(--accent); margin-bottom: 5px; }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; background: var(--text-dim); }
        .status-online { background: var(--green); box-shadow: 0 0 8px var(--green); }

        .content { padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .card { background: #211f1d; padding: 18px; border-radius: 14px; border: 1px solid var(--border); }
        .card-title { font-size: 0.85rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; margin-bottom: 15px; display: block; }
        
        .price-display { font-family: 'JetBrains Mono', monospace; font-size: 2.2rem; font-weight: 700; margin-bottom: 15px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-item { background: var(--bg); padding: 10px; border-radius: 8px; text-align: center; }
        .stat-label { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 2px; }
        .stat-val { font-family: 'JetBrains Mono', monospace; font-size: 1rem; }

        .input-row { margin-bottom: 10px; }
        .input-row label { display: block; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 5px; }
        input { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-family: 'JetBrains Mono'; font-size: 1rem; }
        
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-fetch { background: #2a2825; color: var(--text); border: 1px solid var(--border); margin-bottom: 10px; }
        .btn-calc { background: var(--accent); color: var(--bg); font-size: 1rem; }
        
        .history-container { max-height: 300px; overflow-y: auto; font-size: 0.8rem; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { position: sticky; top: 0; background: #252321; color: var(--text-dim); padding: 10px 5px; border-bottom: 1px solid var(--border); }
        td { padding: 10px 5px; border-bottom: 1px solid #2a2825; font-family: 'JetBrains Mono'; }
        .val-buy { color: var(--green); }
        .val-sell { color: var(--red); }

        .order-box { margin-top: 15px; padding: 15px; border-radius: 10px; background: rgba(212, 165, 116, 0.1); border: 1px dashed var(--accent); text-align: center; display: none; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1>위대리 CLOUD SYNC v2.5</h1>
        <p id="syncStatus"><span class="status-dot"></span>구글 시트 연결 대기 중...</p>
    </div>

    <div class="content">
        <div class="card">
            <span class="card-title">MARKET ANALYSIS</span>
            <button class="btn-fetch" onclick="syncAllData()">🔄 실시간 주가 및 시트 동기화</button>
            <div id="marketData" style="display:none;">
                <div class="price-display" id="qqqPrice">$0.00</div>
                <div class="stat-grid">
                    <div class="stat-item"><div class="stat-label">현재 구간</div><div class="stat-val" id="zoneName" style="font-weight:700;">-</div></div>
                    <div class="stat-item"><div class="stat-label">추세 편차</div><div class="stat-val" id="devVal">0.00%</div></div>
                </div>
            </div>
        </div>

        <div class="card">
            <span class="card-title">REBALANCE CALCULATOR</span>
            <div class="input-row">
                <label>시트상 최종 자산 (자동 로드됨)</label>
                <input type="number" id="prevAsset" readonly style="opacity:0.6;">
            </div>
            <div class="input-row">
                <label>현재 포트폴리오 평가금 ($)</label>
                <input type="number" id="currAsset" placeholder="실시간 자산 입력">
            </div>
            <button class="btn-calc" onclick="calculate()">주문 금액 확인</button>
            <div class="order-box" id="orderBox">
                <div id="orderAction" style="font-size: 1.4rem; font-weight:800; margin-bottom:5px;">---</div>
                <div id="orderDetail" style="font-size: 0.85rem; color: var(--text-dim);"></div>
            </div>
        </div>

        <div class="card">
            <span class="card-title">WEEKLY HISTORY</span>
            <div class="history-container">
                <table id="historyTable">
                    <thead>
                        <tr><th>날짜</th><th>구간</th><th>매매</th><th>총자산</th></tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="4" style="text-align:center; color:var(--text-dim);">동기화 버튼을 눌러주세요.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // 요청하신 구글 시트 웹 게시 CSV 주소 반영
    const GOOGLE_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQo1ZDr9shbkGvfvYe8ML0P1WH_e5HnhRszghXg-K755M5730dO9riDYyS9vCiBDtqV3Zdf8cLzpBUC/pub?output=csv";

    const START_DATE = new Date('2010-02-12');
    const SLOPE = 0.00331; 
    const INTERCEPT = 3.82; 

    const ZONES = [
        { label: '고고평가', min: 0.095, sell: 3.84, buy: 3.49, color: '#c47171' },
        { label: '고평가', min: 0.060, sell: 1.64, buy: 4.68, color: '#ffa726' },
        { label: '중간가', min: -0.100, sell: 0.10, buy: 0.18, color: '#7ca982' },
        { label: '저평가', min: -0.125, sell: 0.19, buy: 4.64, color: '#42a5f5' },
        { label: '저저평가', min: -Infinity, sell: 0.25, buy: 1.84, color: '#ba68c8' }
    ];

    let lastQqqPrice = 0;
    let currentZone = null;

    async function syncAllData() {
        const status = document.getElementById('syncStatus');
        status.innerHTML = `<span class="status-dot"></span>동기화 중...`;

        try {
            // A. 야후 파이낸스 주간 종가 가져오기
            const qqqTarget = encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/QQQ?interval=1wk&range=1mo');
            const qqqRes = await fetch(`https://api.allorigins.win/get?url=${qqqTarget}`);
            const qqqData = JSON.parse((await qqqRes.json()).contents);
            lastQqqPrice = qqqData.chart.result[0].indicators.quote[0].close.filter(c => c !== null).pop();
            
            // B. 구글 시트 CSV 데이터 가져오기
            const sheetRes = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(GOOGLE_SHEET_URL)}`);
            const csvText = (await sheetRes.json()).contents;
            parseSheet(csvText);

            updateMarketUI(lastQqqPrice);
            status.innerHTML = `<span class="status-dot status-online"></span>구글 시트 동기화 완료`;
        } catch (e) {
            console.error(e);
            alert("동기화 실패. 시트의 '웹에 게시' 설정을 확인하세요.");
            status.innerHTML = `<span class="status-dot" style="background:red;"></span>연결 실패`;
        }
    }

    function parseSheet(csv) {
        // NATAS v6.0 구조 분석 (날짜:1, 구간:5, 실투입금:9, 포트폴리오자산:11)
        const rows = csv.split('\n').map(row => row.split(','));
        const tbody = document.querySelector('#historyTable tbody');
        tbody.innerHTML = "";

        let history = [];
        // 5행(index 4)부터 데이터 시작, 그 이전은 헤더 및 요약
        for (let i = rows.length - 1; i >= 5; i--) {
            const row = rows[i];
            if (row.length < 12) continue;

            const date = row[1]?.trim();
            const zone = row[5]?.trim();
            const trade = row[9]?.trim() || "0";
            const asset = parseFloat(row[11]?.replace(/[^0-9.-]+/g, ''));

            if (date && date.includes('/') && !isNaN(asset)) {
                history.push({ date, zone, trade, asset });
            }
        }

        if(history.length > 0) {
            // 가장 최근 행의 자산액을 '지난주 자산'으로 설정
            document.getElementById('prevAsset').value = history[0].asset.toFixed(2);
        }

        // 거래 내역 테이블 업데이트 (최근 15개)
        history.slice(0, 15).forEach(h => {
            const tr = document.createElement('tr');
            const tradeVal = parseFloat(h.trade.replace(/[^0-9.-]+/g, '')) || 0;
            const tradeClass = tradeVal > 0 ? 'val-buy' : (tradeVal < 0 ? 'val-sell' : '');
            
            tr.innerHTML = `
                <td>${h.date}</td>
                <td style="font-weight:600;">${h.zone}</td>
                <td class="${tradeClass}">${tradeVal !== 0 ? (tradeVal > 0 ? '+' : '') + tradeVal.toLocaleString() : '-'}</td>
                <td>$${h.asset.toLocaleString()}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function updateMarketUI(price) {
        const weeks = (new Date() - START_DATE) / (1000 * 60 * 60 * 24 * 7);
        const trend = Math.exp(INTERCEPT + SLOPE * weeks);
        const dev = (price / trend) - 1;
        currentZone = ZONES.find(z => dev > z.min);

        document.getElementById('marketData').style.display = 'block';
        document.getElementById('qqqPrice').innerText = `$${price.toFixed(2)}`;
        document.getElementById('zoneName').innerText = currentZone.label;
        document.getElementById('zoneName').style.color = currentZone.color;
        document.getElementById('devVal').innerText = `${(dev * 100).toFixed(2)}%`;
    }

    function calculate() {
        const prev = parseFloat(document.getElementById('prevAsset').value);
        const curr = parseFloat(document.getElementById('currAsset').value);

        if (!currentZone || isNaN(curr)) { alert("먼저 동기화를 완료하고 현재 자산을 입력하세요."); return; }

        const delta = curr - prev;
        const box = document.getElementById('orderBox');
        const action = document.getElementById('orderAction');
        const detail = document.getElementById('orderDetail');

        box.style.display = 'block';
        if (delta > 0) {
            const amount = delta * currentZone.sell;
            action.innerHTML = `<span style="color:var(--red)">TQQQ $${amount.toLocaleString(undefined, {maximumFractionDigits:2})} 매도</span>`;
            detail.innerText = `이익($${delta.toFixed(2)})의 ${currentZone.sell * 100}%를 매도합니다.`;
        } else if (delta < 0) {
            const amount = Math.abs(delta) * currentZone.buy;
            action.innerHTML = `<span style="color:var(--green)">TQQQ $${amount.toLocaleString(undefined, {maximumFractionDigits:2})} 매수</span>`;
            detail.innerText = `손실($${Math.abs(delta).toFixed(2)})의 ${currentZone.buy * 100}%를 매수합니다.`;
        } else {
            action.innerText = "HOLD (관망)";
            detail.innerText = "자산 변동이 없습니다.";
        }
    }
</script>
</body>
</html>
